name: Nightly Job Scraper

on:
  schedule:
    # 00:00 IST = 18:30 UTC (previous day)
    - cron: "30 18 * * *"
  workflow_dispatch: # allow manual trigger from GitHub UI

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # needed to push jobs.json back to repo

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install playwright beautifulsoup4 requests
          playwright install chromium
          playwright install-deps chromium

      - name: Run scraper
        run: python scraper.py

      - name: Commit and push jobs.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/jobs.json
          git diff --staged --quiet || git commit -m "chore: update job leads [$(date '+%Y-%m-%d %H:%M IST')]"
          git push
